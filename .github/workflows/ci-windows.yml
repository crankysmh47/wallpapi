name: CI (Windows)

on:
  push:
    branches: [ "master", "main", "cursor/**" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        shell: pwsh
        run: .\build.ps1

      - name: Install smoke test
        shell: pwsh
        run: .\test-install.ps1

      - name: Package
        shell: pwsh
        run: .\package.ps1

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: wallpapi-win64-package
          path: dist/*.zip
          if-no-files-found: error
